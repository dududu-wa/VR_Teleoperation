env:
  # Simulation parameters
  sim_dt: 0.005           # MuJoCo timestep (200 Hz physics)
  decimation: 4           # policy step = 4 * sim_dt = 50 Hz
  episode_length_s: 20.0  # max episode length in seconds
  episode_length: 1000    # = episode_length_s / (sim_dt * decimation)

  # Command ranges
  commands:
    stand:
      vx: [0.0, 0.0]
      vy: [0.0, 0.0]
      wz: [0.0, 0.0]
    walk:
      vx: [-0.6, 0.6]
      vy: [-0.3, 0.3]
      wz: [-0.5, 0.5]
    run:
      vx: [0.6, 2.0]
      vy: [-0.3, 0.3]
      wz: [-0.5, 0.5]
    gait_probs: [0.15, 0.55, 0.30]  # stand, walk, run sampling probabilities
    resampling_time: 10.0  # resample commands every N seconds

  # Gait clock
  gait:
    walk_freq: 2.0       # Hz
    run_freq: 3.0        # Hz
    phase_offset: 0.5    # trot-like phase offset between feet
    swing_height: 0.15   # target swing foot height (m)

  # Termination thresholds
  termination:
    max_roll: 0.8        # rad
    max_pitch: 1.0       # rad
    min_height: 0.3      # m, below this = fallen

  # Normalization
  clip_actions: 100.0
  clip_observations: 100.0

  # Push (external perturbation during training)
  push:
    enable: true
    interval_s: 5.0
    max_vel: 0.6         # m/s impulse magnitude
