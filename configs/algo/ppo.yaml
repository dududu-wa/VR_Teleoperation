algo:
  # PPO hyperparameters
  clip_param: 0.2
  gamma: 0.99
  lam: 0.95
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 1.0e-4
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  entropy_coef: 0.01
  weight_decay: 1.0e-2
  num_steps_per_env: 24
  num_learning_iterations: 30000
  save_interval: 100

  # Adaptive KL schedule
  schedule: adaptive
  desired_kl: 0.01

  # Symmetry loss
  use_symmetry_loss: true
  symmetry_loss_coef: 0.5

  # Privileged info reconstruction (sync_update)
  sync_update: true
  adaptation_loss_coef: 1.0

  # Network architecture
  network:
    actor:
      model_name: MlpAdaptModel
      history_encoder_dims: [256, 128]
      state_estimator_dims: [64, 32]
      controller_dims: [512, 256, 128]
      activation: elu
    critic:
      hidden_dims: [512, 256, 128]
      activation: elu

  # Action noise
  init_noise_std: 1.0
  min_noise_std: 0.1
  max_noise_std: 1.2
