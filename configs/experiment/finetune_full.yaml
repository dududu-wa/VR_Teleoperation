# Finetune: Full curriculum training from pretrained balance model
# Usage: python scripts/train.py --experiment-config configs/experiment/finetune_full.yaml \
#        --pretrained-model logs/pretrain_balance/model_5000.pt \
#        --teacher-model assets/pretrained/unitree_g1_12dof.pt

defaults:
  - /base

experiment:
  name: finetune_full
  seed: 42

env:
  num_envs: 4096
  max_episode_length: 1000

intervention:
  use_disturb: true
  curriculum_method: 2  # clip_mean_rad

curriculum:
  initial_phase: 0
  max_phase: 3
  thresholds:
    phase_0:
      tracking_reward: 0.80
      fall_rate: 0.05
      min_iterations: 1500
    phase_1:
      tracking_reward: 0.75
      fall_rate: 0.10
      min_iterations: 2500
    phase_2:
      tracking_reward: 0.70
      fall_rate: 0.15
      transition_failure: 0.15
      min_iterations: 2500

rewards:
  alive:
    weight: 0.15
  tracking_lin_vel:
    sigma: 0.5

algo:
  learning_rate: 5.0e-5
  max_iterations: 25000
  save_interval: 100
  init_noise_std: 0.5
