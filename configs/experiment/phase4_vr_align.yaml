# Phase 4: align with real VR/human motion distribution

defaults:
  - /base

experiment:
  name: phase4_vr_align
  seed: 42

env:
  num_envs: 4096
  max_episode_length: 1000
  command_ranges:
    stand:
      vx: [0.0, 0.0]
      vy: [0.0, 0.0]
      wz: [0.0, 0.0]
    walk:
      vx: [-0.8, 0.8]
      vy: [-0.3, 0.3]
      wz: [-0.6, 0.6]
    run:
      vx: [0.8, 2.2]
      vy: [-0.3, 0.3]
      wz: [-0.6, 0.6]
  gait_probs: [0.10, 0.50, 0.40]

intervention:
  use_disturb: true
  use_motion_library: true
  motion_library_mixing_ratio: [0.2, 0.5, 0.8]

curriculum:
  initial_phase: 4
  max_phase: 4

algo:
  max_iterations: 25000
  save_interval: 100

