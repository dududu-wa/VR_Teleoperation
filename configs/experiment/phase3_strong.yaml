# Phase 3: strong intervention, transition-window stress enabled

defaults:
  - /base

experiment:
  name: phase3_strong
  seed: 42

env:
  num_envs: 4096
  max_episode_length: 1000
  command_ranges:
    stand:
      vx: [0.0, 0.0]
      vy: [0.0, 0.0]
      wz: [0.0, 0.0]
    walk:
      vx: [-0.8, 0.8]
      vy: [-0.3, 0.3]
      wz: [-0.6, 0.6]
    run:
      vx: [0.8, 2.0]
      vy: [-0.3, 0.3]
      wz: [-0.5, 0.5]
  gait_probs: [0.10, 0.55, 0.35]

intervention:
  use_disturb: true
  curriculum_method: 2

curriculum:
  initial_phase: 3
  max_phase: 3

algo:
  max_iterations: 22000
  save_interval: 2000

