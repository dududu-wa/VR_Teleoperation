# Phase 1-3: Progressive training with intervention
# Uses automatic phase curriculum progression

defaults:
  - /base

experiment:
  name: phase1_3_progressive
  seed: 42

env:
  num_envs: 2048
  max_episode_length: 1000

intervention:
  use_disturb: true
  curriculum_method: 2  # clip_mean_rad

curriculum:
  initial_phase: 0
  max_phase: 3
  thresholds:
    phase_0:
      tracking_reward: 0.80
      fall_rate: 0.05
      min_iterations: 2000
    phase_1:
      tracking_reward: 0.75
      fall_rate: 0.10
      min_iterations: 3000
    phase_2:
      tracking_reward: 0.70
      fall_rate: 0.15
      transition_failure: 0.15
      min_iterations: 3000

algo:
  max_iterations: 30000
  save_interval: 2000
