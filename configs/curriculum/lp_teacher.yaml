curriculum:
  system: lp_teacher
  # Phase index is ignored by LP-Teacher, but keep for compatibility.
  initial_phase: 0

  lp_teacher:
    num_bins: 12
    ema_alpha: 0.1
    exploration_prob: 0.15
    min_samples_per_bin: 5
    temperature: 1.0

    # Training signal:
    # signal = reward_scale * tracking_reward
    #          - fall_penalty * fall_rate
    #          - transition_penalty * transition_failure
    reward_scale: 1.0
    fall_penalty: 1.0
    transition_penalty: 0.5
